<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오톡 공유</title>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.6.0/kakao.min.js"></script>
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh; background:#FEE500; margin:0;">
    <button onclick="shareKakao()" style="padding:40px 60px; font-size:32px; font-weight:bold; background:#3C1E1E; color:white; border:none; border-radius:20px; cursor:pointer; width:90%; box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
        카카오톡 전송 🚀
    </button>

    <script>
        Kakao.init('6912adc8e3ae065b07d5878286361fd7');

        function shareKakao() {
            const params = new URLSearchParams(window.location.search);

            const type = params.get('type') || '';
            const method = params.get('method') || '';
            const plt = params.get('plt') || '0';
            const box = params.get('box') || '0';
            const ea = params.get('ea') || '0'; 
            const date = params.get('date') || '';
            const worker = params.get('worker') || '';
            const photoLink = params.get('link') || 'https://www.appsheet.com';

            Kakao.Share.sendDefault({
                // 이미지가 없는 'itemContent' 중심의 피드 형식이야
                objectType: 'feed',
                content: {
                    title: `📢 [${type}] 작업 완료 📢`,
                    description: `담당자: ${worker}\n작업일자: ${date}`,
                    // 이미지를 없애고 싶을 땐 imageUrl을 비우지 말고, 아주 작은 투명 이미지를 넣는 게 카톡 정책상 안전해
                    imageUrl: 'https://cdn-icons-png.flaticon.com/512/10701/10701980.png', 
                    imageWidth: 1,
                    imageHeight: 1,
                    link: {
                        mobileWebUrl: photoLink,
                        webUrl: photoLink,
                    },
                },
                itemContent: {
                    profileText: '[3PL 입&출고 알림]', 
                    items: [
                        { item: 'PLT', itemOp: plt },
                        { item: 'BOX', itemOp: box },
                        { item: '낱개', itemOp: ea },
                        { item: '작업방식', itemOp: method }
                    ]
                },
                // 버튼이 드디어 사진 보기로 고정된다!
                buttons: [
                    {
                        title: '📦 사진 보기',
                        link: {
                            mobileWebUrl: photoLink,
                            webUrl: photoLink,
                        },
                    },
                ],
            });
        }
        // 페이지 열리자마자 자동 실행
        window.onload = function() {
            setTimeout(shareKakao, 500); 
        };
    </script>
</body>
</html>
