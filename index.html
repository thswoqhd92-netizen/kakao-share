<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오톡 공유</title>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.6.0/kakao.min.js"></script>
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh; background:#FEE500; margin:0;">
    <button onclick="shareKakao()" style="padding:50px 20px; font-size:40px; font-weight:bold; background:#3C1E1E; color:white; border:none; border-radius:20px; cursor:pointer; width:90%;">
        카카오톡 전송 🚀
    </button>

    <script>
        Kakao.init('6912adc8e3ae065b07d5878286361fd7');

        function shareKakao() {
            const params = new URLSearchParams(window.location.search);
            const type = params.get('type') || '';
            const method = params.get('method') || '-';
            const plt = params.get('plt') || '0';
            const box = params.get('box') || '0';
            const ea = params.get('ea') || '0'; 
            const date = params.get('date') || '';
            const worker = params.get('worker') || '';
            
            // 앱시트에서 보낸 실제 사진 주소
            let photoLink = params.get('link');
            if (photoLink) photoLink = decodeURIComponent(photoLink);
            else photoLink = 'https://www.appsheet.com';

            Kakao.Share.sendDefault({
                objectType: 'feed',
                // 1. 상단 항목 리스트 (사진 속 레이아웃)
                itemContent: {
                    profileText: '[3PL 입&출고 알림]', 
                    items: [
                        { item: 'PLT', itemOp: plt },
                        { item: 'BOX', itemOp: box },
                        { item: '낱개', itemOp: ea },
                        { item: '작업방식', itemOp: method }
                    ]
                },
                // 2. 중간 제목 및 설명
                content: {
                    title: `📢 [${type}] 작업 완료 📢`,
                    description: `담당자: ${worker}\n작업일자: ${date}`,
                    imageUrl: photoLink, // 여기에 촬영한 사진이 바로 뜸
                    link: {
                        mobileWebUrl: photoLink,
                        webUrl: photoLink,
                    },
                },
                // 3. 하단 사진 보기 버튼 (드디어 부활!)
                buttons: [
                    {
                        title: '📦 사진 보기',
                        link: {
                            mobileWebUrl: photoLink,
                            webUrl: photoLink,
                        },
                    },
                ],
            });
        }

        window.onload = function() {
            setTimeout(shareKakao, 500); 
        };
    </script>
</body>
</html>
