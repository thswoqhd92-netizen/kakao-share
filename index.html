<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오톡 공유</title>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.6.0/kakao.min.js"></script>
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh; background:#FEE500; margin:0;">
    <button onclick="shareKakao()" style="padding:50px 20px; font-size:40px; font-weight:bold; background:#3C1E1E; color:white; border:none; border-radius:20px; cursor:pointer; width:90%;">
        카카오톡 전송 🚀
    </button>

    <script>
        Kakao.init('6912adc8e3ae065b07d5878286361fd7');

        function shareKakao() {
            const params = new URLSearchParams(window.location.search);
            const type = params.get('type') || '작업';
            const worker = params.get('worker') || '담당자';
            const date = params.get('date') || '';
            const plt = params.get('plt') || '0';
            const box = params.get('box') || '0';
            const ea = params.get('ea') || '0';
            const method = params.get('method') || '-';
            
            // 사진 링크가 깨져도 버튼은 나오게 처리
            let photoLink = params.get('link');
            if (photoLink) {
                photoLink = decodeURIComponent(photoLink);
            } else {
                photoLink = 'https://www.appsheet.com';
            }

            // 'feed' 대신 'text' 형식을 섞어서 안정성을 높임
            Kakao.Share.sendDefault({
                objectType: 'feed',
                content: {
                    title: `📢 [${type}] 작업 완료`,
                    description: `PLT: ${plt} / BOX: ${box} / 낱개: ${ea}\n방식: ${method}\n담당: ${worker}\n일시: ${date}`,
                    // 이미지가 있으면 나오고, 없으면 아래 기본 로고가 나옴
                    imageUrl: photoLink,
                    link: { mobileWebUrl: photoLink, webUrl: photoLink }
                },
                buttons: [
                    {
                        title: '📦 실제 사진 보기',
                        link: { mobileWebUrl: photoLink, webUrl: photoLink }
                    }
                ],
            });
        }

        window.onload = function() {
            setTimeout(shareKakao, 500); 
        };
    </script>
</body>
</html>
