<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>카카오톡 공유</title>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.6.0/kakao.min.js"></script>
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh; background:#FEE500; margin:0;">
    <button onclick="shareKakao()" style="padding:20px; font-size:20px; font-weight:bold; background:#3C1E1E; color:white; border:none; border-radius:10px; cursor:pointer;">
        카카오톡 전송 🚀
    </button>

    <script>
        // 네 카카오 JavaScript 키
        Kakao.init('6912adc8e3ae065b07d5878286361fd7');

        function shareKakao() {
            const params = new URLSearchParams(window.location.search);

            // URL에서 데이터 뽑아오기
            const type = params.get('type') || '';
            const method = params.get('method') || '';
            const plt = params.get('plt') || '0';
            const box = params.get('box') || '0';
            const ea = params.get('ea') || '0'; 
            const date = params.get('date') || '';
            const worker = params.get('worker') || '';
            
            const imgUrl = params.get('img') || 'https://cdn-icons-png.flaticon.com/512/2765/2765089.png';

            Kakao.Share.sendDefault({
                objectType: 'feed',
                content: {
                    title: `* [${type}] 작업 완료`,
                    description: `담당자: ${worker}\n작업일자: ${date}`,
                    imageUrl: imgUrl,
                    link: {
                        mobileWebUrl: 'https://www.appsheet.com',
                        webUrl: 'https://www.appsheet.com',
                    },
                },
                itemContent: {
                    profileText: '[3PL 입&출고 알림]', 
                    items: [
                        { item: 'PLT', itemOp: plt },
                        { item: 'BOX', itemOp: box },
                        { item: '낱개', itemOp: ea },
                        { item: '작업방식', itemOp: method }
                    ]
                }
                // 불필요한 buttons 배열은 완전히 삭제했어!
            });
        }
    </script>
</body>
</html>
